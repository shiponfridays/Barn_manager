<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Weights</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="manifest" href="../manifest.json">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="app-shell">
  <div class="top-bar">
    <div class="top-bar-title">
      <i data-lucide="scale" width="18" height="18"></i>
      Weights
    </div>
    <div class="top-bar-actions">
      <button class="btn btn-ghost" onclick="goTo('dashboard.html')">
        <i data-lucide="home" width="15" height="15"></i>
        Home
      </button>
    </div>
  </div>

  <div class="app-container">
    <div class="tabs">
      <button class="tab-button active" data-tab="weightsBarn1">Barn 1</button>
      <button class="tab-button" data-tab="weightsBarn2">Barn 2</button>
    </div>

    <div id="weightsBarn1" class="tab-panel active">
      <div class="card">
        <h2>Barn 1</h2>

        <div class="table-wrapper mt-12">
          <table id="weightsTableBarn1">
            <thead>
              <tr>
                <th>Bucket #</th>
                <th># of Birds</th>
                <th>Weight (g)</th>
                <th>Avg Weight</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>

        <div class="mt-12">
          <strong>Overall Average:</strong>
          <span id="overallAverageBarn1">0.00</span>
        </div>

        <div class="action-row mt-16">
          <button class="btn btn-ghost" onclick="addBucket('barn1')">+ Add Bucket</button>
          <button class="btn btn-ghost" onclick="resetWeights('barn1')">Reset</button>
          <button class="btn btn-primary" onclick="submitWeights('barn1')">Submit</button>
        </div>
      </div>
    </div>

    <div id="weightsBarn2" class="tab-panel">
      <div class="card">
        <h2>Barn 2</h2>

        <div class="table-wrapper mt-12">
          <table id="weightsTableBarn2">
            <thead>
              <tr>
                <th>Bucket #</th>
                <th># of Birds</th>
                <th>Weight (g)</th>
                <th>Avg Weight</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>

        <div class="mt-12">
          <strong>Overall Average:</strong>
          <span id="overallAverageBarn2">0.00</span>
        </div>

        <div class="action-row mt-16">
          <button class="btn btn-ghost" onclick="addBucket('barn2')">+ Add Bucket</button>
          <button class="btn btn-ghost" onclick="resetWeights('barn2')">Reset</button>
          <button class="btn btn-primary" onclick="submitWeights('barn2')">Submit</button>
        </div>
      </div>
    </div>
  </div>

  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/pages/weights.js"></script>
</body>
</html>
