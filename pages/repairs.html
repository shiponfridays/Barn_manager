<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Repairs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#5c4a3d">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/images/favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="../assets/images/favicon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="../assets/images/apple-touch-icon.png">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="manifest" href="../manifest.json">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="app-shell">
  <div class="top-bar">
    <div class="top-bar-title">
      <i data-lucide="wrench" width="18" height="18"></i>
      Repairs
    </div>
    <div class="top-bar-actions">
      <button class="btn btn-primary btn-small" onclick="submitRepairsExport()"><span class="btn-label-long">Submit to Sheet</span><span class="btn-label-short" aria-hidden="true">Submit</span></button>
      <button class="btn btn-ghost" onclick="goTo('dashboard.html')">
        <i data-lucide="home" width="15" height="15"></i>
        Home
      </button>
    </div>
  </div>

  <div class="app-container">
    <div class="card" id="repairFormCard">
      <h2>Repair Submission Form</h2>

      <div class="field-group mt-12" id="repairItemField">
        <label for="repairItem">Item #</label>
        <input type="text" id="repairItem">
      </div>

      <div class="field-group mt-12" id="repairBarnField">
        <label>Barn #</label>
        <div id="repairBarnMount"></div>
      </div>

      <div class="field-group mt-12">
        <label for="repairLocation">Location</label>
        <input type="text" id="repairLocation">
      </div>

      <div class="field-group mt-12">
        <label for="repairIssue">Issue</label>
        <input type="text" id="repairIssue">
      </div>

      <div class="field-group mt-12">
        <label for="repairMaterials">Materials</label>
        <input type="text" id="repairMaterials">
      </div>

      <div class="mt-16">
        <button class="btn btn-primary" onclick="addRepair()">Add Repair</button>
      </div>
    </div>

    <div class="card mt-20">
      <h2>Overall Repairs List</h2>

      <div class="table-wrapper mt-12">
        <table id="repairsTable">
          <thead>
            <tr>
              <th class="col-no">No.</th>
              <th>Item #</th>
              <th>Barn #</th>
              <th>Location</th>
              <th>Issue</th>
              <th>Materials</th>
              <th>Status</th>
              <th>Submitted</th>
              <th class="col-action">Action</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <div id="repairsPagination" class="list-pagination is-hidden" aria-label="Repairs list pagination"></div>
    </div>
  </div>

  <div id="actionConfirmModal" class="popup-overlay" role="dialog" aria-modal="true" aria-labelledby="actionConfirmModalTitle">
    <div class="card popup-card confirm-modal">
      <div class="confirm-modal-icon" aria-hidden="true">
        <i data-lucide="trash-2" width="20" height="20"></i>
      </div>
      <h2 id="actionConfirmModalTitle"></h2>
      <p class="confirm-modal-text" id="actionConfirmModalText"></p>
      <div class="popup-actions confirm-modal-actions">
        <button type="button" class="btn btn-ghost btn-small" id="actionConfirmCancel">Cancel</button>
        <button type="button" class="btn btn-danger btn-small" id="actionConfirmConfirm">Confirm</button>
      </div>
    </div>
  </div>

  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/pages/repairs.js"></script>
</body>
</html>
