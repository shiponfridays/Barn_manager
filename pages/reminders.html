<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reminders</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#5c4a3d">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/images/favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="../assets/images/favicon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="../assets/images/apple-touch-icon.png">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="manifest" href="../manifest.json">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="app-shell">
  <div class="top-bar">
    <div class="top-bar-title">
      <i data-lucide="bell" width="18" height="18"></i>
      Reminders
    </div>
    <div class="top-bar-actions">
      <button class="btn btn-ghost" onclick="goTo('dashboard.html')">
        <i data-lucide="home" width="15" height="15"></i>
        Home
      </button>
    </div>
  </div>

  <div class="app-container">
    <div class="card">
      <h2>Reminder Submission Form</h2>

      <div class="mt-12">
        <label>Reminder</label>
        <textarea id="reminderText" rows="4" placeholder="Enter reminder..."></textarea>
      </div>

      <div class="mt-12">
        <label>Due Date (optional)</label>
        <input type="date" id="reminderDueDate">
      </div>

      <div class="mt-16">
        <button class="btn btn-primary" onclick="addReminder()">Add Reminder</button>
      </div>
    </div>

    <div class="card mt-20">
      <h2>Current Reminders</h2>
      <div id="remindersList" class="mt-12"></div>
      <div id="remindersPagination" class="list-pagination is-hidden" aria-label="Reminders list pagination"></div>
    </div>
  </div>

  <div id="completeReminderModal" class="popup-overlay" role="dialog" aria-modal="true" aria-labelledby="completeReminderModalTitle">
    <div class="card popup-card confirm-modal is-success">
      <div class="confirm-modal-icon" aria-hidden="true">
        <i data-lucide="circle-check" width="20" height="20"></i>
      </div>
      <h2 id="completeReminderModalTitle">Complete reminder?</h2>
      <p class="confirm-modal-text" id="completeReminderModalText"></p>
      <div class="popup-actions confirm-modal-actions">
        <button type="button" class="btn btn-ghost btn-small" id="completeReminderCancel">Cancel</button>
        <button type="button" class="btn btn-success btn-small" id="completeReminderConfirm">Complete</button>
      </div>
    </div>
  </div>

  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/pages/reminders.js"></script>
</body>
</html>
